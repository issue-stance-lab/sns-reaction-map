<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</helmet>

<div style="width:1500px;height:500px;position:relative;overflow:hidden;background:#fbfbfd;font-family:'Inter',system-ui,sans-serif;background-image:radial-gradient(#e3e6ee 1.5px,transparent 1.5px);background-size:26px 26px;">

  <!-- corner waves -->
  <div style="position:absolute;top:-230px;left:-230px;width:460px;height:460px;border-radius:50%;background:#2f6fed;"></div>
  <div style="position:absolute;top:-180px;left:-260px;width:380px;height:380px;border-radius:50%;background:#5b91f5;opacity:.7;"></div>

  <div style="position:absolute;top:-230px;right:-230px;width:460px;height:460px;border-radius:50%;background:#ef3b3b;"></div>
  <div style="position:absolute;top:-260px;right:-180px;width:340px;height:340px;border-radius:50%;background:#f56b6b;opacity:.7;"></div>

  <div style="position:absolute;bottom:-230px;left:-230px;width:460px;height:460px;border-radius:50%;background:#22a559;"></div>
  <div style="position:absolute;bottom:-260px;left:-160px;width:320px;height:320px;border-radius:50%;background:#8b5cf6;opacity:.55;"></div>

  <div style="position:absolute;bottom:-230px;right:-230px;width:460px;height:460px;border-radius:50%;background:#f5a623;"></div>
  <div style="position:absolute;bottom:-180px;right:-260px;width:340px;height:340px;border-radius:50%;background:#f7c948;opacity:.6;"></div>

  <!-- confetti -->
  <div style="position:absolute;top:36px;left:96px;width:12px;height:12px;border-radius:50%;background:#8b5cf6;"></div>
  <div style="position:absolute;top:70px;left:230px;width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:14px solid #ef3b3b;transform:rotate(20deg);"></div>
  <div style="position:absolute;top:60px;left:610px;width:12px;height:12px;background:#f5a623;transform:rotate(45deg);"></div>
  <div style="position:absolute;top:30px;left:1040px;width:16px;height:16px;border-radius:50%;background:#22a559;"></div>
  <div style="position:absolute;top:150px;left:990px;width:10px;height:10px;background:#2f6fed;transform:rotate(45deg);"></div>
  <div style="position:absolute;top:120px;right:60px;width:14px;height:14px;border-radius:50%;background:#8b5cf6;"></div>
  <div style="position:absolute;bottom:150px;left:56px;width:14px;height:14px;border-radius:50%;background:#2f6fed;"></div>
  <div style="position:absolute;bottom:60px;left:420px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid #f5a623;transform:rotate(-15deg);"></div>
  <div style="position:absolute;bottom:100px;right:420px;width:12px;height:12px;background:#22a559;transform:rotate(45deg);"></div>
  <div style="position:absolute;bottom:170px;right:180px;width:14px;height:14px;border-radius:50%;background:#ef3b3b;"></div>
  <div style="position:absolute;bottom:40px;right:70px;width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:14px solid #2f6fed;transform:rotate(10deg);"></div>

  <!-- stat bubbles top -->
  <div style="position:absolute;top:52px;left:88px;background:#fff;border-radius:999px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:12px 22px;display:flex;align-items:center;gap:8px;">
    <span style="width:10px;height:10px;border-radius:50%;background:#2f6fed;"></span>
    <span style="font-size:15px;color:#333;">賛成</span><span style="font-weight:900;font-size:22px;color:#2f6fed;">42%</span>
  </div>
  <div style="position:absolute;top:78px;left:404px;background:#fff;border-radius:999px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:12px 22px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:15px;color:#333;">保留</span><span style="font-weight:900;font-size:22px;color:#f5a623;">18%</span>
  </div>
  <div style="position:absolute;top:52px;left:632px;background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:12px 22px;display:flex;align-items:center;gap:8px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2f6fed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,18 9,11 14,16 22,6"></polyline><polyline points="15,6 22,6 22,13"></polyline></svg>
    <span style="font-weight:800;font-size:17px;color:#2f6fed;">トレンド上昇中！</span>
  </div>
  <div style="position:absolute;top:130px;left:1010px;background:#fff;border-radius:999px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:10px 20px;display:flex;align-items:center;gap:8px;">
    <div style="display:flex;align-items:flex-end;gap:2px;width:18px;height:18px;"><span style="width:4px;height:9px;background:#22a559;"></span><span style="width:4px;height:14px;background:#22a559;"></span><span style="width:4px;height:6px;background:#22a559;"></span></div>
    <span style="font-size:14px;color:#333;">中立</span><span style="font-weight:900;font-size:19px;color:#22a559;">20%</span>
  </div>
  <div style="position:absolute;top:64px;right:70px;background:#fff;border-radius:999px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:12px 22px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:15px;color:#333;">反対</span><span style="font-weight:900;font-size:22px;color:#ef3b3b;">20%</span>
  </div>

  <!-- bottom bubbles -->
  <div style="position:absolute;bottom:96px;left:76px;background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:14px 22px;display:flex;align-items:center;gap:10px;">
    <div style="width:22px;height:22px;border-radius:50%;background:conic-gradient(#22a559 0 60%,#e3e6ee 60% 100%);"></div>
    <div style="display:flex;flex-direction:column;gap:4px;"><div style="width:70px;height:5px;background:#e3e6ee;border-radius:3px;"></div><div style="width:50px;height:5px;background:#e3e6ee;border-radius:3px;"></div></div>
  </div>
  <div style="position:absolute;bottom:66px;left:400px;background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:14px 24px;display:flex;align-items:center;gap:10px;">
    <div style="position:relative;width:22px;height:20px;">
      <span style="position:absolute;left:0;top:0;width:12px;height:12px;border-radius:50%;background:#ef3b3b;"></span>
      <span style="position:absolute;right:0;top:0;width:12px;height:12px;border-radius:50%;background:#ef3b3b;"></span>
      <span style="position:absolute;left:3px;top:6px;width:16px;height:16px;background:#ef3b3b;transform:rotate(45deg);"></span>
    </div>
    <span style="font-weight:900;font-size:22px;color:#ef3b3b;">12.5K</span>
  </div>
  <div style="position:absolute;bottom:80px;left:706px;background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:16px 26px;">
    <svg width="64" height="36" viewBox="0 0 24 24" fill="none" stroke="#2f6fed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,18 9,11 14,16 22,6"></polyline><polyline points="15,6 22,6 22,13"></polyline></svg>
  </div>
  <div style="position:absolute;bottom:100px;right:392px;background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:12px 22px;display:flex;align-items:center;gap:8px;">
    <div style="position:relative;width:18px;height:16px;">
      <div style="width:18px;height:14px;border-radius:9px;background:#8b5cf6;"></div>
      <div style="position:absolute;bottom:-4px;left:4px;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #8b5cf6;"></div>
    </div>
    <span style="font-weight:800;font-size:15px;color:#8b5cf6;">話題沸騰中！</span>
  </div>
  <div style="position:absolute;bottom:60px;right:70px;background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(20,30,60,.15);padding:14px 22px;">
    <div style="display:flex;align-items:flex-end;gap:5px;width:40px;height:34px;"><span style="width:8px;height:16px;background:#f5a623;"></span><span style="width:8px;height:28px;background:#f5a623;"></span><span style="width:8px;height:22px;background:#f5a623;"></span></div>
  </div>

  <!-- pie chart -->
  <div style="position:absolute;left:96px;top:210px;width:260px;height:260px;border-radius:50%;box-shadow:0 10px 26px rgba(20,30,60,.22),0 0 0 6px #fff;background:conic-gradient(#2f6fed 0 42%,#ef3b3b 42% 62%,#22a559 62% 82%,#f5a623 82% 100%);"></div>

  <!-- center title -->
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <div style="font-weight:900;font-size:96px;color:#14213d;letter-spacing:-0.01em;text-shadow:0 4px 0 rgba(20,30,60,.08);">SNS反応まっぷ</div>
    <div style="font-size:26px;color:#5a6072;font-weight:600;margin-top:6px;">その話題、SNSでは実はどっちが多い？</div>
  </div>

  <!-- ranking widget -->
  <div style="position:absolute;right:70px;top:210px;display:flex;flex-direction:column;gap:16px;width:280px;">
    <sc-for list="{{ rankBars }}" as="r" hint-placeholder-count="4">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="width:14px;height:14px;border-radius:50%;background:{{ r.color }};flex:none;"></span>
        <div style="flex:1;height:20px;border-radius:999px;background:#e9ebf2;overflow:hidden;">
          <div style="height:100%;border-radius:999px;background:{{ r.color }};width:{{ r.w }}%;"></div>
        </div>
      </div>
    </sc-for>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1500,&quot;height&quot;:500}}">
class Component extends DCLogic {
  renderVals() {
    return {
      rankBars: [
        { color: '#ef3b3b', w: 78 },
        { color: '#2f6fed', w: 64 },
        { color: '#22a559', w: 48 },
        { color: '#f5a623', w: 34 },
      ],
    };
  }
}

</script>
</body>
</html>
