recurring:
  gsc-review:
    title: Search Console 確認とタイトル改善候補の抽出
    cadence: weekly
    last_run: 2026-07-07
    procedure: 表示回数が多くCTRが低いページを抽出し、タイトル/description改善を experiments に起票
    needs_human: GSC画面のデータ取得（スクショまたはCSV）
    notes: 2026-07-07に docs/gsc-review-2026-07-07.md へ取得項目と起票判断を整理。2026-07-08に scripts/fetch_gsc_metrics.py で自動取得化（docs/gsc-automation.md）。次回はこのスクリプトを使う

  kpi-snapshot:
    title: KPI週次スナップショット更新
    cadence: weekly
    last_run: 2026-07-23
    procedure: kpi.snapshots に1行追加。scripts/fetch_growth_kpi.py で自動取得（人間依頼は自動取得失敗時のみ）
    needs_human: 自動取得が失敗した場合のみ、各管理画面の数値取得
    notes: 2026-07-23に自動取得・snapshot追記済み。weekly_users 14 / pageviews 181 / pages_per_session 3.175 / votes_total 11（テスト票除外）/ gsc_impressions 45 / gsc_clicks 2。x_followers のみ引き続き手動

  x-profile:
    title: Xプロフィール・固定ポスト改善
    cadence: weekly
    priority: critical
    last_run: 2026-07-09
    procedure: プロフィール文・固定ポスト・ヘッダー画像を確認し「何のアカウントか3秒で分かるか」を評価。改善案を人間に提案する
    needs_human: プロフィール更新操作。ハブはブラウザでXにログインできないため現行プロフィール文言の確認自体も人間依頼
    notes: >-
      初期トラクション最優先。フォロワー獲得の第一関門。2026-07-09に初回レビュー実施（ハブはX画面を直接閲覧できないため、現状文言不明を前提に改善の型のみ提案）。
      人間への依頼: (1) 現在のプロフィール文・固定ポスト・ヘッダー画像のスクショ共有 (2) 下記たたき台の採用可否判断。
      提案bio案: 「SNS上の賛否・論点を1テーマ1ページで見える化。投票で自分の立場も参加できます。#SNS反応まっぷ」。
      固定ポスト案: サイト紹介+人気テーマ（あだ名禁止 or 高市早苗）へのリンクを固定し、初見フォロワーが1クリックで投票できる導線にする

  x-posting:
    title: X運用（新テーマ告知・引用RT・リプライ）
    cadence: daily（リプライ1-3件）+ per-theme-publish（告知）+ weekly（投稿文案の補充）
    priority: critical
    phase_rule: initial_traction では毎ループ必ず実行する（judge_at 判定より先に確認）
    minimum_action:
      daily: URLなしリプライ 1-3件（同一アカウントへの連日リプライは避ける）
      weekly: URL付き投稿または引用RT 1-2件（フォロワー100未満フェーズ。スパム判定回避のため抑制）、プロフィール・固定ポスト・投稿文言の見直し
    last_run: 2026-07-22
    procedure: 毎日「Xのリプライ検索」で高閲覧数（目安1万views以上）の関連ポストを探しリプライ先を提案。週次で引用RT候補・投稿文案を補充
    needs_human: 実際の投稿操作（1日1-3件）
    notes: >-
      旧TASK_BOARD課題6（フォロワー0→100）をここに移管。2026-07-07に docs/x-posts.md へ週次投稿3本、URLなし返信5本、URL付き返信3本の候補を追加。
      同日に引用RT3本実施（憲法改正/@tamakiyuichiro・高齢者免許/@taketake1w・高市早苗/@shukan_bunshun）。今週のURL付き引用RT上限到達。
      2026-07-08にURLなしリプライ3本実施（辺野古/@Sankei_news・高齢者免許/@nikkei・高市/@AtsushiKomori）。
      2026-07-09はURLなしリプライ3本実施（辺野古遺族/@narumita・憲法改正/@hashimoto_lo・生成AI著作権/@Henry66239746）。
      来週引用RT仕込み: @nhk_news（辺野古）・@izmkenta（辺野古文科委）・@yamazoejimusyo（憲法改正）

