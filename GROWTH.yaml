capabilities:
  share-after-vote:
    title: 投票完了後のXシェアボタン
    hypothesis: 投票直後は熱量が最も高く、結果画面にシェア導線を置けばシェア数が増える
    scope: 全テーマ共通。投票結果表示に「結果をXでシェア」ボタン（テーマ名+自分の立場+URL入りテキスト自動生成）
    status: measuring
    priority: 1
    metric: Xシェア経由の流入（GA4 utm_source=share_button）
    started_at: 2026-07-07
    judge_at: 2026-07-30
    reflection: 2026-07-23時点で過去7日のshare_button流入は0件。実投票は9→11に増えたがシェア起点流入は確認できない。7/23に全10テーマの固定XシェアJSの404を解消したため、修正後データを1週間計測する（1回目延長）
    notes: 既存の投票後Xシェア導線を全公開テーマで utm_source=share_button / utm_medium=social / utm_campaign=vote_share 付きに統一。OGP画像が既に整備済みなのでカードは綺麗に出るはず

  related-themes-block:
    title: 投票完了後・ページ末尾の関連テーマ表示
    hypothesis: 読了・投票完了時点が離脱点。そこに関連テーマカードを置けば回遊が増える
    scope: 全テーマ共通。ページ末尾と投票完了画面に他テーマカード2-3枚
    status: measuring
    priority: 2
    metric: pages_per_session、内部リンククリック（GA4イベント）
    started_at: 2026-07-08
    judge_at: 2026-07-30
    reflection: 2026-07-23時点でrelated_theme_clickは0件、pages/sessionは5.529→3.175。母数14ユーザーと少なく、導線の効果を判断できないため1週間延長する（1回目延長）。次回も0件なら導線・イベント発火を再点検する
    notes: ポータルの回遊カード実装を流用。2026-07-07に8テーマへ投票結果内関連テーマと related_theme_click GA4イベントを実装。share-after-voteとは別指標（回遊 vs X流入）のため並行計測開始（2026-07-08）

  portal-featured-slot:
    title: トップページの注目テーマ枠
    hypothesis: 新着・話題性の高いテーマを最上部に出すと初回訪問者の直帰が減る
    scope: ポータルに「注目」枠1つ。GROWTH.yaml の featured フィールドで指定
    status: measuring
    priority: 3
    metric: ポータルからテーマページへの遷移率
    started_at: 2026-07-05
    judge_at: 2026-07-30
    reflection: 2026-07-23時点でトップ系ページは合計56PVあるが、注目枠からテーマへの遷移イベントを個別取得できておらず効果判定不能。現行の副首都枠で1週間延長する（1回目延長）
    notes: school-nickname-ban から fukushuto に切り替え済み

  x-post-templates:
    title: X投稿テンプレート自動生成
    hypothesis: テーマごとの定型投稿（問題提起+スタンスマップ画像+URL）を用意すれば投稿頻度が上がる
    scope: 新テーマ公開時・データ補充時にハブが投稿文案を生成し人間に渡す運用をループに組み込む
    status: measuring
    priority: 4
    metric: x_followers、X経由流入（GA4）
    started_at: 2026-07-05
    judge_at: 2026-07-30
    reflection: 2026-07-23時点でXフォロワー数は未取得。直近投稿対象の副首都は過去7日58PV、皇室典範は32PVで上位だがUTM帰属は確認できない。X活動を継続し、フォロワー数の手動確認と合わせて1週間延長する（1回目延長）
    notes: school-nickname-ban の投稿文案を初回生成済み（下記参照）

  design-tokens-unify:
    title: 全テーマの配色・フォント・余白のトークン統一
    hypothesis: ページごとにトーンがバラつくと「作りかけ感」が出て再訪意欲を下げる。共通CSSトークン化で一貫した世界観にする
    scope: 全テーマ+ポータル。色・フォント・余白を共通CSS変数に集約（TASK_BOARD課題18の残作業と連動）
    status: measuring
    priority: 5
    metric: 直帰率、pages_per_session（間接指標。主目的はサイト魅力）
    built_at: 2026-07-08
    started_at: 2026-07-09
    judge_at: 2026-07-30
    reflection: 2026-07-23時点でpages/sessionは5.529→3.175だが、14ユーザーの小標本かつ複数施策が並行しておりデザイントークン単独の影響は判定不能。表示不具合は確認されていないため1週間延長する（1回目延長）
    notes: サイト魅力枠。docs/site-tokens.css を新規作成し全12ページへ link 追加。--ink/--muted/--line/--panel/--shadow/--font/--radius を共通化。テーマ固有の --bg/--accent/--grad-* は各ページに残存。コンソールエラーなし・375px横スクロールなし・保護タグ全確認済み。PR #11 を2026-07-09にmainへマージし計測開始

  vote-2d-canvas:
    title: 2Dキャンバス投票UI（vote2d.js）
    hypothesis: 4択ボタンより「2Dマップで自分の立場を置く」体験の方が投票ハードルが下がり、完了後のシェア率も上がる
    scope: 全テーマ共通。#vote-buttons コンテナにキャンバスを注入し、クリック/タップでXY軸上のピンを配置→確定→結果表示→スタンスマップに「あなたの位置」を反映
    status: built
    priority: 6
    metric: votes_week / weekly_users（投票転換率）、シェアボタンクリック率
    built_at: 2026-07-10
    judge_at: 2026-07-24
    notes: |
      vote2d.js を docs/ に配置し全8テーマページに組み込み完了。
      ・キャンバスサイズ: デスクトップ 幅フル×270px / モバイル(<500px) ×210px
      ・投票データは localStorage（sns_vote2d_v1_<topic>_my）に保存
      ・再訪時: DOMContentLoaded で setStanceMapVoteMarker を呼びスタンスマップに「あなた」マーカーを復元
      ・スタンスマップのマーカー位置は正確な (sx,sy) 座標で描画（旧: 象限中心の固定点）
      ・Supabase 集計対応済み（supabaseUrl 空の場合は localStorage 集計にフォールバック）
      ・実装ブランチ: task/growth-2d-vote-canvas

  vote-ux-mobile:
    title: モバイル投票UXの摩擦低減
    hypothesis: 投票ボタンまでのスクロール距離・タップ精度がモバイルでの投票率を下げている。導線短縮で votes_week が増える
    scope: 全テーマ共通。投票セクションへの追従ボタンまたはファーストビュー内投票導線
    status: idea
    priority: 7
    metric: votes_week / weekly_users（投票転換率）
    notes: vote-2d-canvas の効果を見てから判断（2Dキャンバス自体が mobile UX を改善する可能性あり）。375px実機確認必須

  portal-first-view:
    title: ポータルのファーストビュー改善
    hypothesis: 初見3秒で「何のサイトか・何ができるか」が伝わっていない。ヒーロー文言+人気テーマ即表示で直帰が減る
    scope: index.html のファーストビュー（キャッチコピー・注目枠の視認性）
    status: idea
    priority: 7
    metric: ポータル直帰率、テーマページ遷移率
    notes: サイト魅力枠。portal-featured-slot の判定結果（7/19）を見てから着手

