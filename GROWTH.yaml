# GROWTH.yaml — グロース台帳（単一の真実源）
# 最終更新: 2026-07-23
#
# 目的: 来訪者・回遊・投票・SNSシェアを増やす施策の台帳。
# 制作・品質維持は THEMES.yaml / LOOP.md の管轄（このファイルでは扱わない）。
#
# 構造:
#   phase:        現在のグロースフェーズ（initial_traction / growth）と卒業条件
#   kpi:          週次スナップショット（人間がGA4/GSC/Supabaseから転記、またはハブが依頼）
#   capabilities: 一度作れば全テーマに効くサイト機能。工程は idea → building → built（検証済み・マージ待ち）→ measure → done
#                 計測中の凍結は「同じ指標を動かす変更のマージ」のみ。実装は built まで先行してよい（GROWTH_LOOP.md build-ahead）
#   experiments:  仮説→実装→計測→判定のライフサイクルを持つ施策
#                 status: idea / building / measuring / adopted / rejected / blocked
#   recurring:    定期運用タスク。priority: critical のものは毎ループ必ず確認する
#   activity_log: 計測中施策と並行して行った変更の時系列ログ（初期トラクションフェーズ用）
#
# ルール:
#   - measuring 状態の experiment は同時に1つまで（効果の切り分けのため）
#   - judge_at の扱いはフェーズ依存。initial_traction では振り返り日（reflection記録で延長可）、growth では判定期限（adopted/rejected 必須）
#   - 保護タグ（GA4/AdSense/Supabase/OGP）は絶対に壊さない

phase:
  current: initial_traction
  until:
    x_followers: 100
    weekly_users: 100
    votes_total: 100          # votes_week が未取得のため総投票数で代替
  principle: 厳密な効果分離より、露出・投稿・改善量を優先する
  graduated_on: null          # until 条件すべて達成した週の月曜に記入

