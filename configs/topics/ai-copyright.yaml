name: "ai-copyright"
title: "生成AIと著作権問題"

categories:
  - "著作権厳格保護・クリエイターの権利回復を最優先"
  - "AI技術推進・過度な規制は競争力を損なう"
  - "法規制強化・ライセンス制度や許諾要件の整備を求める"
  - "利用者モラル・クレジット表記や配慮の欠如を問題視"
  - "条件付き容認・オプトアウトや対価支払いで共存"
  - "実用主義・利便性重視で問題に深入りしない"
  - "その他・分類保留"

stances:
  - "規制賛成"
  - "規制反対"
  - "条件付き容認"
  - "モラル重視"
  - "保留"
  - "その他"

fetch_queries:
  - "生成AI 著作権"
  - "生成AI 規制"
  - "生成AI 反対"
  - "生成AI 賛成"
  - "生成AI 便利"
  - "AI 著作権侵害"
  - "AI学習 無断"
  - "AI絵 パクリ"
  - "AI 規制 やりすぎ OR 反対"
  - "AI イラスト 問題"
  - "AI イラスト 良い OR 便利 OR 助かる"
  - "生成AI クリエイター"
  - "AI 活用 メリット"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【最重要ルール】単なるニュースのURL共有（自分の意見がないもの）、無関係なつぶやきは「その他・分類保留」に分類してください。投稿者の主観的な意見・感情・評価が含まれているものだけを該当カテゴリに分類します。
  - 「賛成」「反対」と明言していなくても、感情や評価から立場が読み取れる場合は分類してください。例：「気持ち悪い」「パクリじゃん」→否定的、「便利だからいいじゃん」→肯定的。
  - 皮肉・反語・疑問形（「〜ですよね？」「〜じゃないの？」）も文脈から実際の主張を推定して分類してください。
  - 批判の矢印が「AI・AI利用者」に向いているか「規制派・権利主張者」に向いているかを区別してください。
  - AI学習を「著作権侵害」「パクリ」「盗用」と表現し、クリエイター保護を最優先する意見は「著作権厳格保護・クリエイターの権利回復を最優先」に分類します。
  - 規制を「技術の遅れ」「国際競争力の損失」「表現の自由の制約」と批判する意見は「AI技術推進・過度な規制は競争力を損なう」に分類します。
  - 政府による法整備、ライセンス制度、許諾要件の明確化を求める意見は「法規制強化・ライセンス制度や許諾要件の整備を求める」に分類します。
  - 法律以前にAI利用者の倫理・クレジット表記・配慮の欠如を問題にする意見は「利用者モラル・クレジット表記や配慮の欠如を問題視」に分類します。
  - オプトアウト制度、透明性確保、対価支払いなど条件付きでAI利用を容認する意見は「条件付き容認・オプトアウトや対価支払いで共存」に分類します。
  - 著作権議論に関心が薄く、利便性・生産性・娯楽性を重視する意見は「実用主義・利便性重視で問題に深入りしない」に分類します。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

few_shot_examples:
  - text: "またAIの「学習」って言い訳で絵パクられてる人がいるけど、これもう立派な被害じゃん。法律で何とかしてよ。"
    category: "法規制強化・ライセンス制度や許諾要件の整備を求める"
    reason: "「法律で何とかしてよ」と政府介入を要求。AI学習を「言い訳」「被害」と評価。"
  - text: "規制しまくったら日本だけAI遅れて世界に取り残されるって。先進国でこんなに後ろ向きな国ないよ。"
    category: "AI技術推進・過度な規制は競争力を損なう"
    reason: "規制を「後ろ向き」と評価し、日本の技術遅れを懸念。"
  - text: "クレジットも貼らずにAI生成って隠して使ってる人が一番害悪。法律がどうこうよりそこの問題じゃない？"
    category: "利用者モラル・クレジット表記や配慮の欠如を問題視"
    reason: "法規制以前に利用者の倫理欠如を糾弾。"
  - text: "私も絵は描くしAIは使うけど、その境界線が自分の中で曖昧になってきて怖い。"
    category: "条件付き容認・オプトアウトや対価支払いで共存"
    reason: "両方の活動を実践しつつ共存を模索。"
  - text: "騒いでる人たちって結局使い方わかってないだけじゃないの？便利なものを拒否する理由がわからん。"
    category: "実用主義・利便性重視で問題に深入りしない"
    reason: "反対派を矮小化し利便性を肯定。"

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - ニュースリンクの共有だけであっても、投稿者の短い一言（例:「これはひどい」「当然だろ」「意味ない」など）から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。

rule_overrides:
  - markers:
      - "著作権侵害"
      - "パクリ"
      - "盗用"
      - "絵師を守れ"
      - "無断学習"
    force_category: "著作権厳格保護・クリエイターの権利回復を最優先"
    force_stance: "規制賛成"
    min_confidence: 0.85

  - markers:
      - "規制するな"
      - "技術の進歩"
      - "取り残される"
      - "表現の自由"
      - "ラッダイト"
    force_category: "AI技術推進・過度な規制は競争力を損なう"
    force_stance: "規制反対"
    min_confidence: 0.85
