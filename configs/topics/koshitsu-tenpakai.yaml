name: "koshitsu-tenpakai"
title: "皇室典範改正（女性皇族の皇籍維持・旧宮家養子）"

# テンプレート: faction（賛成 vs 反対 vs 制度論）

categories:
  - "男系維持・養子賛成"
  - "女性/女系天皇容認"
  - "立法手法・拙速批判"
  - "養子制度への疑問"
  - "その他・分類保留"

stances:
  - "男系維持"
  - "女性女系容認"
  - "拙速批判"
  - "養子疑問"
  - "その他"

fetch_queries:
  - "皇室典範改正"
  - "皇室典範 成立"
  - "女性皇族 皇籍"
  - "旧宮家 養子"
  - "女性天皇 女系天皇"
  - "皇位継承 安定"
  - "男系継承 維持"
  - "皇室典範 反対"
  - "皇室典範 賛成"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【最重要ルール】単なるニュースのURL共有（自分の意見がないもの）、無関係なつぶやきは「その他・分類保留」に分類してください。投稿者の主観的な意見・感情・評価が含まれているものだけを該当カテゴリに分類します。
  - 「賛成」「反対」と明言していなくても、感情や評価から立場が読み取れる場合は分類してください。
  - 皮肉・反語・疑問形も文脈から実際の主張を推定して分類してください。
  - 男系維持の重要性を主張し、旧宮家養子を肯定的に評価する意見は「男系維持・養子賛成」。
  - 女性天皇・女系天皇を容認すべきとする意見、愛子天皇論、男女平等の観点からの批判は「女性/女系天皇容認」。
  - 「十分な議論がない」「拙速」「抱き合わせ採決」「国論を二分」など立法プロセスを問題視する意見は「立法手法・拙速批判」。
  - 「600年前の血筋」「憲法14条違反」「養子候補が拒否」など養子制度そのものの実現性・正当性に疑問を呈する意見は「養子制度への疑問」。
  - 「立法手法・拙速批判」と「養子制度への疑問」は別カテゴリ。手続き批判と実体批判を区別すること。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

few_shot_examples:
  - text: "皇室典範改正で旧宮家の男系男子を養子に迎える道が開かれた。2000年の伝統を守る画期的な一歩。"
    category: "男系維持・養子賛成"
    reason: "男系継承維持を評価し養子制度を肯定"
  - text: "愛子さまが天皇になれないのはおかしい。国民の8割が女性天皇に賛成なのに国会は何をしている。"
    category: "女性/女系天皇容認"
    reason: "女性天皇容認＋世論との乖離を批判"
  - text: "養子案と女性皇籍維持を抱き合わせにして一括採決。丁寧な議論もなく数の力で押し通した。"
    category: "立法手法・拙速批判"
    reason: "立法プロセス・採決手法への批判"
  - text: "600年も皇室を離れた一般人を養子にするのは無理がある。憲法14条の門地差別にも抵触するのでは。"
    category: "養子制度への疑問"
    reason: "血統距離と違憲性への疑問"

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - ニュースリンクの共有だけであっても、投稿者の短い一言から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。

