name: "school-nickname-ban"
title: "学校でのあだ名禁止の是非"

categories:
  - "いじめ防止や心理的安全確保の観点からあだ名禁止・さん付けに賛成"
  - "男女平等の推進やジェンダー配慮の観点からさん付けに賛成"
  - "親しみが薄れることやコミュニケーションの制限を懸念しあだ名禁止・さん付けに反対"
  - "表面的な禁止はいじめの根本解決にならないとして一律の禁止に反対"
  - "嫌なあだ名のみを禁止し親しい呼び方は容認するなどルール運用や柔軟な対応を支持"
  - "その他・分類保留"

stances:
  - "賛成"
  - "反対"
  - "条件付き容認"
  - "保留"
  - "その他"

fetch_queries:
  - "あだ名禁止"
  - "あだ名 さん付け"
  - "あだ名 廃止"
  - "学校 あだ名"
  - "学校 あだ名禁止"
  - "小学校 あだ名"
  - "さん付け"
  - "さん付け指導"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【最重要ルール】単なるニュースの見出し紹介（自分の意見がないもの）、無関係な個人的つぶやきなどは「その他・分類保留」に分類してください。本人の主観的な「あだ名禁止やさん付け指導の是非に対する賛否・感想・意見」が含まれているものだけを該当カテゴリに分類します。
  - 「あだ名でのからかいからいじめに発展するのを防げる」「さん付けによってお互い尊重する丁寧な関係ができる」「さん付けにすることで教室が落ち着く」など、いじめ防止や安全・人間関係づくりを理由にあだ名禁止・さん付けを肯定する意見は「いじめ防止や心理的安全確保の観点からあだ名禁止・さん付けに賛成」に分類します。
  - 「男の子は『くん』女の子は『ちゃん』ではなく一律『さん』にすることでジェンダー平等を推進できる」という観点を支持する意見は「男女平等の推進やジェンダー配慮の観点からさん付けに賛成」に分類します。
  - 「あだ名で呼び合うからこそ親しみがわくのに、一律禁止にしたら人間関係がギスギスする」「過度な管理教育だ」「友達同士の距離が遠くなって寂しい」など、コミュニケーションや親密さの阻害を懸念して反対する意見は「親しみが薄れることやコミュニケーションの制限を懸念しあだ名禁止・さん付けに反対」に分類します。
  - 「あだ名を禁止しても陰口や別の形でのいじめに変わるだけ」「問題の本質はいじめの温床となる人間関係や家庭環境であり、言葉狩りは意味がない」「表面的な禁止でいじめがなくなると大人が思っているのがズレている」など、いじめ防止策としての実効性の無さや本質から外れていることを理由に反対する意見は「表面的な禁止はいじめの根本解決にならないとして一律の禁止に反対」に分類します。
  - 「親しみのある良いあだ名まで禁止するべきではない」「本人が嫌がっている呼び方や蔑称だけを個別に禁止・指導すべきで、一律のルールで縛るのはやりすぎ」など、柔軟な運用を求める意見は「嫌なあだ名のみを禁止し親しい呼び方は容認するなどルール運用や柔軟な対応を支持」に分類します。
  - 攻撃的表現はsummaryで中和する。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - ニュースリンクの共有だけであっても、投稿者の短い一言（例:「これは賛成」「やりすぎだろ」「意味ない」など）から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。

rule_overrides:
  - markers:
      - "あだ名禁止賛成"
      - "さん付け賛成"
      - "さん付けは良い"
      - "いじめ防止になる"
    force_category: "いじめ防止や心理的安全確保の観点からあだ名禁止・さん付けに賛成"
    force_stance: "賛成"
    force_summary: "いじめ防止や人間関係の平穏化のため、あだ名禁止・さん付け指導を支持する主張。"
    min_confidence: 0.90

  - markers:
      - "ギスギスする"
      - "親しみが薄れる"
      - "距離ができる"
      - "親しみがない"
      - "寂しいな"
      - "呼び捨てでいい"
    force_category: "親しみが薄れることやコミュニケーションの制限を懸念しあだ名禁止・さん付けに反対"
    force_stance: "反対"
    force_summary: "あだ名禁止により友人同士の親密さが失われ、コミュニケーションが阻害されることを懸念する主張。"
    min_confidence: 0.90

  - markers:
      - "いじめはなくならない"
      - "いじめ解決にならない"
      - "本質的ではない"
      - "言葉狩り"
      - "意味がない"
      - "表面的な"
    force_category: "表面的な禁止はいじめの根本解決にならないとして一律の禁止に反対"
    force_stance: "反対"
    force_summary: "あだ名を禁止してもいじめの根本的な解決にはならず、大人の自己満足や言葉狩りに過ぎないと批判する主張。"
    min_confidence: 0.90
