name: "ai-copyright-v2"
title: "生成AIと著作権問題"

categories:
  - "クリエイター権利保護"
  - "AI技術推進・自由利用"
  - "法制度・ルール整備"
  - "利用者モラル・倫理"
  - "条件付き共存"
  - "実用・利便性重視"
  - "情報共有・ニュース言及"
  - "対象外・分類保留"

stances:
  - "反対・規制求む"
  - "賛成・活用推進"
  - "条件付き"
  - "中立・観察"
  - "判断不能"

fetch_queries:
  - "生成AI 著作権"
  - "生成AI 規制"
  - "生成AI 反対"
  - "生成AI 賛成"
  - "生成AI 便利"
  - "AI 著作権侵害"
  - "AI学習 無断"
  - "AI絵 パクリ"
  - "AI 規制 やりすぎ OR 反対"
  - "AI イラスト 問題"
  - "AI イラスト 良い OR 便利 OR 助かる"
  - "生成AI クリエイター"
  - "AI 活用 メリット"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【categoryとstanceの軸を明確に分離すること。categoryは「何の論点について話しているか」、stanceは「生成AI利用に対してどちら寄りか」で判定する。
  - 【重要】ニュースのURL共有だけでなく、投稿者の短い一言（例:「これはひどい」「当然だろ」「意味ない」等）から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。純粋なニュース共有（自分の評価が一言もない）は「情報共有・ニュース言及」に分類する。
  - 「賛成」「反対」と明言していなくても、感情や評価から立場が読み取れる場合は分類してよい。例：「気持ち悪い」「パクリじゃん」→否定的、「便利だからいいじゃん」→肯定的。
  - 皮肉・反語・疑問形（「〜ですよね？」「〜じゃないの？」）も文脈から実際の主張を推定して分類してよい。
  - 「賛成」「反対」と言及している場合、その対象が何に対する賛成・反対かを必ず確認すること。例：「生成AI禁止に賛成」→ stanceは「反対・規制求む」、「生成AI利用に賛成」→ stanceは「賛成・活用推進」。
  - 批判の矢印が「AI・AI利用者」に向いているか「規制派・権利主張者」に向いているかを区別してください。
  - AI学習を「著作権侵害」「パクリ」「盗用」と表現し、クリエイター保護を最優先する意見は「クリエイター権利保護」に分類する。stanceは原則「反対・規制求む」。
  - 規制を「技術の遅れ」「国際競争力の損失」「表現の自由の制約」と批判する意見は「AI技術推進・自由利用」に分類する。stanceは原則「賛成・活用推進」。
  - 政府による法整備、ライセンス制度、許諾要件の明確化を求める意見は「法制度・ルール整備」に分類する。stanceは原則「反対・規制求む」。
  - 法律以前にAI利用者の倫理・クレジット表記・配慮の欠如を問題にする意見は「利用者モラル・倫理」に分類する。stanceは原則「反対・規制求む」。
  - オプトアウト制度、透明性確保、対価支払いなど条件付きでAI利用を容認する意見は「条件付き共存」に分類する。stanceは「条件付き」。
  - 著作権議論に関心が薄く、利便性・生産性・娯楽性を重視する意見は「実用・利便性重視」に分類する。stanceは原則「賛成・活用推進」。
  - テーマ関連のニュースや情報を共有しているが、自身の意見・評価が含まれていない投稿は「情報共有・ニュース言及」に分類する。stanceは「中立・観察」。article_usableは false とする。
  - テーマと完全に無関係な投稿、意見が読み取れない投稿のみ「対象外・分類保留」にする。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

few_shot_examples:
  - text: "またAIの「学習」って言い訳で絵パクられてる人がいるけど、これもう立派な被害じゃん。法律で何とかしてよ。"
    category: "法制度・ルール整備"
    stance: "反対・規制求む"
    reason: "「法律で何とかしてよ」と政府介入を要求。AI学習を「言い訳」「被害」と評価。"
  - text: "規制しまくったら日本だけAI遅れて世界に取り残されるって。先進国でこんなに後ろ向きな国ないよ。"
    category: "AI技術推進・自由利用"
    stance: "賛成・活用推進"
    reason: "規制を「後ろ向き」と評価し、日本の技術遅れを懸念。"
  - text: "クレジットも貼らずにAI生成って隠して使ってる人が一番害悪。法律がどうこうよりそこの問題じゃない？"
    category: "利用者モラル・倫理"
    stance: "反対・規制求む"
    reason: "法規制以前に利用者の倫理欠如を糾弾。"
  - text: "私も絵は描くしAIは使うけど、その境界線が自分の中で曖昧になってきて怖い。"
    category: "条件付き共存"
    stance: "条件付き"
    reason: "両方の活動を実践しつつ共存を模索。"
  - text: "騒いでる人たちって結局使い方わかってないだけじゃないの？便利なものを拒否する理由がわからん。"
    category: "実用・利便性重視"
    stance: "賛成・活用推進"
    reason: "反対派を矮小化し利便性を肯定。"
  - text: "生成AI 使ってアニメ作ったら著作権どうなるんだろう。日本のアニメ会社も何か決めなきゃいけない時代だね。"
    category: "情報共有・ニュース言及"
    stance: "中立・観察"
    reason: "ニュース話題を共有しているが、自身の明確な評価・立場がない。article_usable=false。"
  - text: "生成AI のビジネス利用、著作権は大きなテーマですね。人間が「創作的寄与」をすることで、AIコンテンツにも著作権が発生するという見解、実践的で安心感が増すのではないでしょうか。"
    category: "クリエイター権利保護"
    stance: "反対・規制求む"
    reason: "AIコンテンツにも著作権が認められるべきと主張。クリエイター側の利益を重視する論調。"
  - text: "えーと、誤解を招いてるみたいなので改めて言うと趣旨には賛成です。主催者が生成AIを禁止するという意図で書いたのは明白でしょう。私が言いたいのは書き方が良くないって話。"
    category: "クリエイター権利保護"
    stance: "反対・規制求む"
    reason: "「生成AI禁止に賛成」と明言。規制・禁止を支持する立場。"
  - text: "AIって便利だなって思う反面、AI生成のイラストってのは本当に恐ろしいと感じる。精巧で美麗な絵だなって思った物が、もはや人の手から離れた物だったりすることもざらだ。"
    category: "条件付き共存"
    stance: "条件付き"
    reason: "AIの便利さと恐怖の両面を感じており、単純な賛否ではなく条件付きの姿勢。"

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - ニュースリンクの共有だけであっても、投稿者の短い一言（例:「これはひどい」「当然だろ」「意味ない」等）から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。
  - 感情的な投稿や相手を批判している投稿でも、どちら側に向かっているか（AI利用を批判かAI利用を肯定か）が読み取れる場合は分類してください。
  - 著作権議論の文脈で意見を述べているが「生成AI」を直接言及しない投稿でも、テーマ関連であれば保留にしない。

rule_overrides:
  - markers:
      - "著作権侵害"
      - "パクリ"
      - "盗用"
      - "絵師を守れ"
      - "無断学習"
    force_category: "クリエイター権利保護"
    force_stance: "反対・規制求む"
    min_confidence: 0.85

  - markers:
      - "規制するな"
      - "技術の進歩"
      - "取り残される"
      - "表現の自由"
      - "ラッダイト"
    force_category: "AI技術推進・自由利用"
    force_stance: "賛成・活用推進"
    min_confidence: 0.85
