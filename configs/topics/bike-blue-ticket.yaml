name: "bike-blue-ticket"
title: "自転車の青切符（反則金）導入の是非"

categories:
  - "取締り強化賛成・マナーや危険運転の改善を期待"
  - "インフラ未整備への不満・専用レーンの設置が先決"
  - "車道走行への不安・原則車道は事故を増やすと反対"
  - "制度が不十分・青切符に留まらず自転車も免許制にすべき"
  - "ルールが曖昧・現場の混乱や取り締まりへの不審で反対"
  - "その他・分類保留"

stances:
  - "賛成（取締り強化）"
  - "インフラ優先"
  - "車道走行懸念"
  - "免許制要求"
  - "混乱懸念"
  - "その他"

fetch_queries:
  - "自転車 青切符 賛成"
  - "自転車 青切符 反対"
  - "自転車 青切符 当然"
  - "自転車 青切符 おかしい"
  - "自転車 青切符 やりすぎ"
  - "自転車 青切符 道路 OR インフラ"
  - "自転車 青切符 車道 怖い"
  - "自転車 青切符 免許"
  - "自転車 取締り 強化"
  - "自転車 交通違反 反則金"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【最重要ルール】単なるニュースのURL共有（自分の意見がないもの）、無関係なつぶやきは「その他・分類保留」に分類してください。投稿者の主観的な意見・感情・評価が含まれているものだけを該当カテゴリに分類します。
  - 「賛成」「反対」と明言していなくても、感情や評価から立場が読み取れる場合は分類してください。例：「マナー悪すぎるから当然」「車道走れとか死ねってこと？」など。
  - 皮肉・反語・疑問形も文脈から実際の主張を推定して分類してください。
  - 「マナー改善や事故減少に繋がる」として青切符や取締りの厳格化を支持する意見は「取締り強化賛成・マナーや危険運転の改善を期待」に分類します。
  - 「自転車専用レーンや道路が整備されていないのに取り締まるのはおかしい」とインフラ不足を批判する意見は「インフラ未整備への不満・専用レーンの設置が先決」に分類します。
  - 「自転車は車道を走るルールだが、車道は車が近くて怖すぎる、事故が増えるだけだ」と安全性から反対する意見は「車道走行への不安・原則車道は事故を増やすと反対」に分類します。
  - 「青切符で小銭を稼ぐだけでは生ぬるい、自転車も免許制や講習義務化にすべきだ」という更なる厳格化を求める意見は「制度が不十分・青切符に留まらず自転車も免許制にすべき」に分類します。
  - 「ルールが複雑でどれが違反かわからない」「警察の利権や点数稼ぎだ」と不信感や混乱を理由にする意見は「ルールが曖昧・現場の混乱や取り締まりへの不審で反対」に分類します。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

few_shot_examples:
  - text: "自転車のマナー最悪だから青切符は当然でしょ。信号無視とかスマホ見ながら運転するやつ多すぎる。"
    category: "取締り強化賛成・マナーや危険運転の改善を期待"
    reason: "「当然でしょ」と青切符を肯定し、マナーの悪さを指摘。"
  - text: "自転車も青切符になるのはいいけど、そもそも自転車レーンが少なすぎる。車道を走れって言うなら安全に走れる道を作ってからにして。"
    category: "インフラ未整備への不満・専用レーンの設置が先決"
    reason: "青切符自体には理解を示しつつも、インフラ整備が先決であると主張。"
  - text: "自転車で車道走るの本当に怖いんだけど。大型トラックの横とか走らされたら青切符以前に命がいくつあっても足りない。"
    category: "車道走行への不安・原則車道は事故を増やすと反対"
    reason: "車道走行の恐怖や危険性を強く訴え、制度に否定的な感情を表明。"
  - text: "青切符だけじゃ甘いよ。自転車も原付みたいに学科試験と免許制にして、ちゃんと標識を理解した奴だけ乗せるべき。"
    category: "制度が不十分・青切符に留まらず自転車も免許制にすべき"
    reason: "青切符よりも厳しい免許制への移行を要求。"
  - text: "また警察の小遣い稼ぎが始まった。一時停止の基準とか曖昧だし、どうせ反則金取るのが目的だろ。"
    category: "ルールが曖昧・現場の混乱や取り締まりへの不審で反対"
    reason: "警察の取り締まり目的への不信感や、ルールの曖昧さを指摘。"

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - ニュースリンク of 共有だけであっても、投稿者の短い一言（例:「当然だ」「やりすぎ」「怖い」など）から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。

