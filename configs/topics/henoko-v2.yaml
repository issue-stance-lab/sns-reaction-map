classification_rules: |
  - このテーマでは単純な賛否ではなく、批判対象と論点を分けて分類してください。
  - 文科省判断への態度と、学校・引率責任への批判を混同しないでください。
  - 追悼・慰霊は、追悼や黙祷への共感が中心の投稿だけにしてください。責任追及・政治批判・報道批判が中心なら該当カテゴリに分けてください。
  - 「文科省判断支持」は、教育基本法違反認定や政治的中立性違反を支持する投稿です。
  - 「文科省判断への反発」は、文科省の認定が教育現場や平和教育を萎縮させると懸念する投稿です。
  - 「安全管理・引率責任」は、乗船判断、運航、安全確保、再発防止などが主眼の投稿です。
  - 「学校・教育委員会批判」は、学校法人、校長、教員、引率側の説明責任・処分・謝罪を求める投稿です。
  - 「政治利用・反基地運動批判」は、反基地運動、政治団体、政治利用への批判が中心の投稿です。
  - 「報道・行政対応批判」は、報道機関や行政の扱い方を批判する投稿です。
  - ニュース共有、URL紹介、短い見出しのみは article_usable を false にしてください。
  - 未確認の断定、強い個人攻撃、陰謀論的表現は review_required を true にし、article_usable を false にしてください。

