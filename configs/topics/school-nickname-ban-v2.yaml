prompt_intro: "あなたは学校現場・教育論争に関するSNS投稿の論点分類器です。説明や思考は不要です。"

prompt_theme: |
  対象テーマ:
  学校でのあだ名禁止、呼び捨て禁止、一律さん付け指導、嫌なあだ名への対応、いじめ防止、ジェンダー配慮、学校現場での呼称ルールをめぐる反応。

classification_rules: |
  - 【最重要】このテーマでは、単純な賛成/反対より「どの論点に反応しているか」を優先して分類してください。
  - 学校・教育現場・児童生徒・教師・保護者・いじめ・さん付け指導・あだ名禁止に関係しない投稿は「対象外・分類保留」にしてください。
  - 「学校」「小学校」という語があっても、学校でのあだ名禁止・さん付け指導・いじめ防止・呼称ルールへの反応でなければ対象外です。
  - 「さん付け」という語があっても、芸能人、配信者、ゲーム、会社名、敬称一般、日常会話だけの話で学校制度と無関係なら「対象外・分類保留」です。
  - 「本田圭佑さん」「選手」「配信者」「芸能人」「後輩」「先輩」「会社」「職場」など、学校制度ではない敬称・人間関係の話は「対象外・分類保留」です。
  - 単なるニュース見出しやURL共有だけで、投稿者本人の評価・感想・体験がない場合は「情報共有・立場不明」にしてください。article_usable は false にしてください。
  - 「自分の学校」「子どもの学校」「小学校時代」「昔」「担任」「先生」「我が子」「甥」「娘」「息子」「クラス」「同級生」など、具体的な学校経験・保護者視点・教員視点が中心なら、制度への明確な賛否より「体験談・現場感覚」を優先してください。
  - あだ名で嫌な思いをした、変なあだ名を付けられた、からかわれた、という回想は、制度支持が明記されていなければ「体験談・現場感覚」にしてください。あだ名禁止を支持すると明記している場合だけ「いじめ防止・心理的安全」にしてください。
  - 「あだ名で傷つく」「からかいを防ぐ」「いじめ予防になる」「安心して学校生活を送れる」など、被害防止や安心を重視する投稿は「いじめ防止・心理的安全」に分類します。
  - 「くん/ちゃんをやめて一律さん付けにする」「性別で呼び方を分けない」など、ジェンダー平等や敬称統一を支持する投稿は「ジェンダー配慮・さん付け支持」に分類します。
  - 「親しみがなくなる」「距離ができる」「呼び方まで管理されるのは窮屈」「学校がギスギスする」など、学校の呼称ルールによる親しさの喪失を懸念する投稿は「親しさ・呼称文化への懸念」に分類します。学校文脈のない呼び方相談には使わないでください。
  - 「あだ名禁止でもいじめはなくならない」「言葉狩り」「表面的」「本質的ないじめ対策ではない」など、一律禁止の効果を疑う投稿は「一律禁止への実効性批判」に分類します。
  - 「嫌がる呼び方だけ止めればよい」「本人が嫌ならやめる」「親しい呼び名はよい」「ケースバイケース」など、個別対応や柔軟運用を求める投稿は「柔軟運用・本人意思重視」に分類します。
  - 自分の学校、子どもの学校、教師としての経験、昔の呼び方など、明確な賛否より経験共有が中心なら「体験談・現場感覚」に分類します。
  - 「あだ名禁止でいい」「さん付けでいい」は肯定的です。反対カテゴリに入れないでください。
  - 「あだ名禁止はやりすぎ」「さん付け指導は気持ち悪い」「意味ない」は否定的または懸念です。肯定カテゴリに入れないでください。
  - `stance` は表示用の反応タイプです。政策への賛否は `policy_attitude` に分けてください。
  - `policy_attitude` は、あだ名禁止・さん付け指導への態度を `肯定` / `否定` / `条件付き` / `判断不能` / `対象外` で答えてください。
  - `experience_type` は、本人経験、保護者視点、教員視点、児童生徒視点、一般論、ニュース共有、なしから選んでください。
  - `article_usable` は、代表意見として本文やカードに出してよい具体的な意見・体験がある場合だけ true にしてください。ニュース共有のみ、単語だけ、対象外、攻撃的表現中心は false です。
  - 「対象外・分類保留」「情報共有・立場不明」「その他・分類保留」の場合、article_usable は必ず false にしてください。
  - 学校制度への態度が読めない体験談は article_usable を false にしてください。代表投稿に使えるのは、制度・呼称ルール・いじめ対策への意見が読める投稿だけです。
  - 攻撃的表現は summary で中和してください。
  - confidence は 0.0 から 1.0。

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - 学校でのあだ名禁止・さん付け指導への短い感想が読める場合は、最も近い論点カテゴリへ寄せてください。
  - ただし、学校制度と無関係な「さん付け」一般投稿、ゲーム・芸能・配信者名の話は無理に分類せず「対象外・分類保留」にしてください。

