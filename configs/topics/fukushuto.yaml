name: "fukushuto"
title: "副首都法案・副首都構想"

# テンプレート: faction（賛成 vs 反対 vs 場所・内容に関する意見）

categories:
  - "賛成・推進"
  - "反対・慎重"
  - "場所・候補地に関する意見"
  - "制度・法案内容への疑問"
  - "その他・分類保留"

stances:
  - "賛成"
  - "反対"
  - "場所意見"
  - "制度疑問"
  - "その他"

fetch_queries:
  - "副首都法案"
  - "副首都構想"
  - "副首都 大阪"
  - "副首都 維新"
  - "副首都 反対"
  - "副首都 防災"
  - "副首都 費用"
  - "副首都 どこ"
  - "副首都 南海トラフ"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【最重要ルール】単なるニュースのURL共有（自分の意見がないもの）、無関係なつぶやきは「その他・分類保留」に分類してください。投稿者の主観的な意見・感情・評価が含まれているものだけを該当カテゴリに分類します。
  - 「賛成」「反対」と明言していなくても、感情や評価から立場が読み取れる場合は分類してください。
  - 皮肉・反語・疑問形も文脈から実際の主張を推定して分類してください。
  - 「大阪ありき」「東京に近すぎる」「福岡の方が良い」など候補地・場所に特化した意見は「場所・候補地に関する意見」。
  - 「副首都の定義がない」「生煮え」「首都の法的定義がないのに副首都を先に決めるのは矛盾」など法案の中身・手続きへの疑問は「制度・法案内容への疑問」。
  - 防災・経済成長・地方分権を根拠に推進する意見は「賛成・推進」。
  - 税金の無駄・南海トラフリスク・消費税減税より優先度が低いなどの批判は「反対・慎重」。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

few_shot_examples:
  - text: "首都直下地震や南海トラフに備えて首都機能を分散するのは当然。大阪を副首都にして多極成長型の国家を作るべき。"
    category: "賛成・推進"
    reason: "防災・多極成長を根拠に推進"
  - text: "消費税減税は先送りなのに副首都法案は強行。物価高に苦しむ国民より先にやることか。"
    category: "反対・慎重"
    reason: "優先順位批判＋財政批判"
  - text: "大阪は東京に近すぎる。南海トラフで共倒れになる。副首都なら札幌か福岡の方がいい。"
    category: "場所・候補地に関する意見"
    reason: "大阪の地理的問題を指摘し他候補を提案"
  - text: "そもそも副首都って何？法案を読んでも定義が書いていない。首都の法的定義もないのに副首都だけ先に決めるのは矛盾では？"
    category: "制度・法案内容への疑問"
    reason: "法案の定義不備・手続きへの疑問"

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。
  - ニュースリンクの共有だけであっても、投稿者の短い一言から明確にスタンスが読める場合は、最も近いカテゴリに割り当ててください。

rule_overrides: []
