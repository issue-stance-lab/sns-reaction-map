name: "takaichi"
title: "高市文春・中傷動画問題"

categories:
  - "高市氏批判・責任追及"
  - "高市氏擁護・報道批判"
  - "玉木氏比較・説明責任"
  - "玉木氏擁護・貰い事故"
  - "サナエトークン関連"
  - "松井健氏を軸にした拡張"
  - "ネット選挙・透明性問題"
  - "未確認・陰謀寄り"
  - "その他・分類保留"

stances:
  - "批判"
  - "擁護"
  - "比較"
  - "保留"
  - "未確認"
  - "その他"

fetch_queries:
  - "高市 文春 中傷動画 -rt"
  - "高市 中傷動画 -rt"
  - "高市 松井健 -rt"
  - "高市 玉木 松井健 -rt"
  - "サナエトークン -rt"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 「文春が捏造」「共同捏造」「事件はでっちあげ」「高市総理は無関係」「高市総理の指示ではない」は高市氏擁護・報道批判。
  - 「高市氏は説明すべき」「公設秘書が関与なら重大」「辞任すべき」は高市氏批判・責任追及。
  - 「玉木氏も同じでは」「玉木氏も説明すべき」は玉木氏比較・説明責任。
  - 「玉木氏は巻き込まれ」「同列視は雑」は玉木氏擁護・貰い事故。
  - 「サナエトークン」「暗号資産」「金融庁」「補償」はサナエトークン関連。
  - 「AI、外注、広告、発信主体、拡散、選挙の透明性」が主眼ならネット選挙・透明性問題。
  - 攻撃的表現はsummaryで中和する。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。文脈が少しでも読める場合は最も近いカテゴリへ寄せる。
  - ニュース共有だけでも、共有対象が高市氏責任追及なら高市氏批判、報道懐疑なら高市氏擁護、サナエトークンならサナエトークン関連にする。
  - 皮肉・揶揄は、攻撃対象を推定して分類する。
  - その他・分類保留は、本文が短すぎる、意味不明、分類対象外の場合だけ使う。

rule_overrides:
  - markers:
      - "高市総理は無関係"
      - "高市氏は無関係"
      - "高市総理の指示ではない"
      - "高市首相の指示ではない"
      - "高市さんの指示ではない"
      - "文春、共同捏造"
      - "文春と共同"
      - "共同捏造"
      - "文春の捏造"
      - "事件はでっちあげ"
      - "疑惑は晴れ"
      - "捏造だった"
      - "でっちあげ"
      - "文春のあやふや証拠"
      - "高市政権追い詰める前に"
      - "立憲は今別の件"
    force_category: "高市氏擁護・報道批判"
    force_stance: "擁護"
    force_summary: "報道や疑惑を疑い、高市氏本人の関与を否定する主張。"
    force_reason: "報道批判または高市氏本人の関与否定を明示しているため。"
    min_confidence: 0.85

# Output schema fields beyond the base (category, stance, summary, reason, confidence, article_usable, risk)
extra_output_fields: []

# Markdown report title
markdown_title: "SNS反応 Ollamaバッチ分類版"

# Ollama options
ollama_options:
  temperature: 0.1
  num_predict: 2500

# Default text truncation length
text_max_length: 700
