const W = 600, H = 600, PAD = 60, INNER = W - PAD * 2;
const IMG_ALPHA_START = 0.72, IMG_ALPHA_END = 0.30;
let imgAlpha = IMG_ALPHA_END;
let showHeat = true, showDots = true, heatRadius = 40;
let activeFilter = 'all';
let spotlightTarget = null;
let animating = false, animFrame = 0;

const canvasMain = document.getElementById('canvasMain');
const ctx = canvasMain.getContext('2d');
const canvasHeat = document.getElementById('canvasHeat');
const hCtx = canvasHeat.getContext('2d');

function toCanvas(x, y) {
  return [
    PAD + (x + 2) / 4 * INNER,
    PAD + (2 - y) / 4 * INNER
  ];
}

function emoRGB(e) {
  const t = (e + 2) / 4;
  if (t < 0.5) {
    const s = t * 2;
    return [Math.round(74 + (187-74)*s), Math.round(144 + (187-144)*s), Math.round(217 + (187-217)*s)];
  } else {
    const s = (t - 0.5) * 2;
    return [Math.round(187 + (224-187)*s), Math.round(187 + (92-187)*s), Math.round(187 + (92-187)*s)];
  }
}

function seededRand(seed) {
  let s = seed ^ 0x12345678;
  s = ((s >>> 16) ^ s) * 0x45d9f3b | 0;
  s = ((s >>> 16) ^ s) * 0x45d9f3b | 0;
  s = (s >>> 16) ^ s;
  return (s >>> 0) / 0xffffffff;
}

const jCache = RAW.map((_, i) => [
  (seededRand(i*2) - 0.5) * 14,
  (seededRand(i*2+1) - 0.5) * 14
]);

function visible(p) {
  if (activeFilter === 'all') return true;
  const x = p.x, y = p.y, e = p.e;
  if (activeFilter === 'q1') return x > 0 && y > 0;
  if (activeFilter === 'q2') return x < 0 && y > 0;
  if (activeFilter === 'q3') return x < 0 && y < 0;
  if (activeFilter === 'q4') return e >= 1.5;
  if (activeFilter === 'calm') return e <= 0;
  return true;
}

function drawHeatmap() {
  if (!showHeat) { hCtx.clearRect(0, 0, W, H); return; }
  const res = 3;
  const cols = Math.ceil(W / res), rows = Math.ceil(H / res);
  const grid = new Float32Array(cols * rows);
  const sigma = heatRadius / 2.5;
  const sig2 = sigma * sigma * 2;
  const r2 = heatRadius * heatRadius;

  RAW.forEach(p => {
    if (!visible(p)) return;
    const [cx, cy] = toCanvas(p.x, p.y);
    const gx0 = Math.max(0, Math.floor((cx - heatRadius) / res));
    const gy0 = Math.max(0, Math.floor((cy - heatRadius) / res));
    const gx1 = Math.min(cols - 1, Math.ceil((cx + heatRadius) / res));
    const gy1 = Math.min(rows - 1, Math.ceil((cy + heatRadius) / res));
    for (let gy = gy0; gy <= gy1; gy++) {
      for (let gx = gx0; gx <= gx1; gx++) {
        const dx = gx * res - cx, dy = gy * res - cy;
        const d2 = dx*dx + dy*dy;
        if (d2 < r2) grid[gy * cols + gx] += Math.exp(-d2 / sig2);
      }
    }
  });

  const maxV = Math.max(...grid) || 1;
  const imgData = hCtx.createImageData(cols * res, rows * res);

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      const v = grid[gy * cols + gx] / maxV;
      if (v < 0.01) continue;
      let r, g, b;
      if (v < 0.5) {
        const t = v * 2;
        r = Math.round(41 + (255-41)*t); g = Math.round(128 + (255-128)*t); b = Math.round(185 + (150-185)*t);
      } else {
        const t = (v - 0.5) * 2;
        r = 255; g = Math.round(255 * (1-t)); b = Math.round(150 * (1-t));
      }
      const alpha = Math.round(v * 230);
      for (let dy = 0; dy < res; dy++) {
        for (let dx = 0; dx < res; dx++) {
          const px = (gy * res + dy) * cols * res * 4 + (gx * res + dx) * 4;
          const inPad = (gx*res+dx) >= PAD && (gx*res+dx) < PAD+INNER && (gy*res+dy) >= PAD && (gy*res+dy) < PAD+INNER;
          if (!inPad) continue;
          imgData.data[px] = r; imgData.data[px+1] = g; imgData.data[px+2] = b; imgData.data[px+3] = alpha;
        }
      }
    }
  }
  hCtx.clearRect(0, 0, W, H);
  hCtx.putImageData(imgData, 0, 0);
}

function drawBase() {
  ctx.clearRect(0, 0, W, H);
  drawQuadImages();

  // グリッド
  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 1;
  [-2,-1.5,-1,-0.5,0.5,1,1.5,2].forEach(v => {
    const [cx] = toCanvas(v, 0);
    ctx.beginPath(); ctx.moveTo(cx, PAD); ctx.lineTo(cx, PAD+INNER); ctx.stroke();
    const [,cy] = toCanvas(0, v);
    ctx.beginPath(); ctx.moveTo(PAD, cy); ctx.lineTo(PAD+INNER, cy); ctx.stroke();
  });

  // 軸
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1.5;
  const [midX] = toCanvas(0, 0); const [,midY] = toCanvas(0, 0);
  ctx.beginPath(); ctx.moveTo(PAD, midY); ctx.lineTo(PAD+INNER, midY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX, PAD); ctx.lineTo(midX, PAD+INNER); ctx.stroke();

  // 象限ラベル
  ctx.font = '11px -apple-system,sans-serif';
  ctx.font = 'bold 13px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  const quadLabels = [
    ['取締賛成×安全優先', PAD + INNER*0.75, PAD + 26],
    ['取締反対×安全優先', PAD + INNER*0.25, PAD + 26],
    ['取締反対×利用者優先', PAD + INNER*0.25, PAD + INNER - 10],
    ['取締賛成×利用者優先', PAD + INNER*0.75, PAD + INNER - 10],
  ];
  quadLabels.forEach(([text, lx, ly]) => {
    const tw = ctx.measureText(text).width;
    const ph = 18, pw = tw + 16, rx = lx - pw/2, ry = ly - ph + 4, r = 4;
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.beginPath();
    ctx.moveTo(rx + r, ry);
    ctx.lineTo(rx + pw - r, ry);
    ctx.arcTo(rx + pw, ry, rx + pw, ry + r, r);
    ctx.lineTo(rx + pw, ry + ph - r);
    ctx.arcTo(rx + pw, ry + ph, rx + pw - r, ry + ph, r);
    ctx.lineTo(rx + r, ry + ph);
    ctx.arcTo(rx, ry + ph, rx, ry + ph - r, r);
    ctx.lineTo(rx, ry + r);
    ctx.arcTo(rx, ry, rx + r, ry, r);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText(text, lx, ly);
  });

  // 軸目盛り
  ctx.font = '9px -apple-system,sans-serif'; ctx.fillStyle = '#bbb';
  ctx.textAlign = 'right';
  [-2,-1.5,-1,-0.5,0.5,1,1.5,2].forEach(v => {
    const [,cy] = toCanvas(0, v); ctx.fillText((v>0?'+':'')+v, PAD-4, cy+3);
  });
  ctx.textAlign = 'center';
  [-2,-1.5,-1,-0.5,0.5,1,1.5,2].forEach(v => {
    const [cx] = toCanvas(v, 0); ctx.fillText((v>0?'+':'')+v, cx, PAD+INNER+12);
  });

  // ドット
  if (showDots) {
    const count = animating ? animFrame : RAW.length;
    for (let i = 0; i < count; i++) {
      const p = RAW[i];
      const show = visible(p);
      const [cx, cy] = toCanvas(p.x, p.y);
      const [rr, gg, bb] = emoRGB(p.e);
      ctx.beginPath();
      ctx.arc(cx + jCache[i][0], cy + jCache[i][1], 2.5 + p.c * 2, 0, Math.PI*2);
      ctx.fillStyle = show ? `rgba(${rr},${gg},${bb},0.8)` : 'rgba(200,200,200,0.08)';
      ctx.fill();
      if (show) { ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5; ctx.stroke(); }
    }
  }

  // スポットライト
  if (spotlightTarget) {
    const [sx, sy] = spotlightTarget;
    ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI*2);
    ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(sx, sy, 24, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(41,128,185,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

function redraw() { drawHeatmap(); drawBase(); }

function playIntro() {
  animating = true; animFrame = 0; imgAlpha = IMG_ALPHA_START;
  const total = RAW.length, duration = 1800, start = performance.now();
  function tick(now) {
    const elapsed = now - start, progress = Math.min(1, elapsed / duration);
    animFrame = Math.min(total, Math.round(progress * total));
    imgAlpha = progress < 0.5 ? IMG_ALPHA_START : IMG_ALPHA_START + (IMG_ALPHA_END - IMG_ALPHA_START) * ((progress - 0.5) / 0.5);
    redraw();
    if (progress < 1) requestAnimationFrame(tick);
    else { animating = false; imgAlpha = IMG_ALPHA_END; redraw(); }
  }
  requestAnimationFrame(tick);
}

let tourActive = false, currentStep = 0;

function showTourStep(idx) {
  const step = TOUR[idx], total = TOUR.length;
  document.getElementById('tourStep').textContent = `Step ${idx+1} / ${total}`;
  document.getElementById('tourTitle').textContent = step.title;
  document.getElementById('tourDesc').textContent = step.desc;
  document.getElementById('tourProgressBar').style.width = ((idx+1)/total*100)+'%';

  const embedEl = document.getElementById('tourEmbed');
  const loadingEl = document.getElementById('tourEmbedLoading');
  const fallbackEl = document.getElementById('tourQuoteFallback');
  embedEl.style.display = 'none'; loadingEl.style.display = 'none'; fallbackEl.style.display = 'none';
  embedEl.innerHTML = '';

  if (step.quote && step.quote_url) {
    loadingEl.style.display = 'block';
    const tweetId = step.quote_url.replace('x.com','twitter.com').split('/status/')[1];
    if (tweetId) {
      const doEmbed = () => {
        window.twttr.widgets.createTweet(tweetId, embedEl, { theme:'dark', dnt:true, conversation:'none' });
        let waited = 0;
        const poll = setInterval(() => {
          waited += 100;
          if (embedEl.querySelector('iframe')) { clearInterval(poll); loadingEl.style.display='none'; embedEl.style.display='block'; }
          else if (waited >= 4000) { clearInterval(poll); loadingEl.style.display='none'; showFallback(step, fallbackEl); }
        }, 100);
      };
      if (window.twttr && window.twttr.widgets) {
        window.twttr.ready(doEmbed);
      } else {
        // widgets.jsがまだロードされていない場合は最大5秒待機
        let wt = 0;
        const wpoll = setInterval(() => {
          wt += 200;
          if (window.twttr && window.twttr.widgets) { clearInterval(wpoll); window.twttr.ready(doEmbed); }
          else if (wt >= 5000) { clearInterval(wpoll); loadingEl.style.display='none'; showFallback(step, fallbackEl); }
        }, 200);
      }
    } else { loadingEl.style.display='none'; showFallback(step, fallbackEl); }
  } else if (step.quote) { showFallback(step, fallbackEl); }

  activeFilter = step.filter || 'all';
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.fbtn[data-q="${step.filter || 'all'}"]`);
  if (btn) btn.classList.add('active');

  spotlightTarget = step.highlight ? (() => { const [sx,sy]=toCanvas(step.highlight[0],step.highlight[1]); return [sx,sy]; })() : null;
  redraw();
}

function showFallback(step, fallbackEl) {
  document.getElementById('tourQuoteText').textContent = '「' + step.quote + '」';
  const linkEl = document.getElementById('tourQuoteLink');
  if (step.quote_url) { linkEl.style.display='block'; fallbackEl.onclick=()=>window.open(step.quote_url,'_blank'); }
  else { linkEl.style.display='none'; fallbackEl.onclick=null; }
  fallbackEl.style.display = 'block';
}

function startTour() { tourActive=true; currentStep=0; document.getElementById('tourPanel').classList.add('active'); showTourStep(0); }
function closeTour() {
  tourActive=false; document.getElementById('tourPanel').classList.remove('active');
  spotlightTarget=null; activeFilter='all';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.fbtn[data-q="all"]').classList.add('active');
  redraw();
}

document.getElementById('startTour').addEventListener('click', startTour);
document.getElementById('btnClose').addEventListener('click', closeTour);
document.getElementById('btnNext').addEventListener('click', () => { if (currentStep < TOUR.length-1) { currentStep++; showTourStep(currentStep); } else closeTour(); });
document.getElementById('btnPrev').addEventListener('click', () => { if (currentStep > 0) { currentStep--; showTourStep(currentStep); } });

document.getElementById('chkHeat').addEventListener('change', e => { showHeat=e.target.checked; redraw(); });
document.getElementById('chkDots').addEventListener('change', e => { showDots=e.target.checked; redraw(); });
document.getElementById('heatIntensity').addEventListener('input', e => { heatRadius=+e.target.value; redraw(); });
document.querySelector('.filters').addEventListener('click', e => {
  const btn = e.target.closest('.fbtn'); if (!btn) return;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeFilter=btn.dataset.q; spotlightTarget=null; redraw();
});

const tooltip = document.getElementById('tooltip');
canvasMain.addEventListener('mousemove', e => {
  const rect = canvasMain.getBoundingClientRect();
  const sx = W/rect.width, sy = H/rect.height;
  const mx = (e.clientX-rect.left)*sx, my = (e.clientY-rect.top)*sy;
  let found=null, minD=20;
  RAW.forEach((p,i) => {
    if (!visible(p)) return;
    const [cx,cy] = toCanvas(p.x,p.y);
    const d = Math.hypot(mx-(cx+jCache[i][0]), my-(cy+jCache[i][1]));
    if (d < minD) { minD=d; found={p,i}; }
  });
  if (found) {
    const p = found.p;
    const eLabel = p.e>=1.5?'😤 激怒':p.e>=0.5?'😠 感情的':p.e<=-1?'😒 皮肉・冷笑':'😐 冷静';
    const tx = e.clientX+14+260>window.innerWidth ? e.clientX-270 : e.clientX+14;
    tooltip.style.opacity='1'; tooltip.style.left=tx+'px'; tooltip.style.top=(e.clientY-10)+'px';
    tooltip.innerHTML = `<b>${p.s}</b><br>取締: ${p.x>0?'+':''}${p.x} ／ 優先: ${p.y>0?'+':''}${p.y}<br>${eLabel} (${p.e}) ／ 確信度 ${Math.round(p.c*100)}%${p.u?'<br><small style="opacity:.5">クリックでXへ ↗</small>':''}`;
  } else { tooltip.style.opacity='0'; }
});
canvasMain.addEventListener('mouseleave', () => { tooltip.style.opacity='0'; });
canvasMain.addEventListener('click', e => {
  const rect = canvasMain.getBoundingClientRect();
  const sx = W/rect.width, sy = H/rect.height;
  const mx = (e.clientX-rect.left)*sx, my = (e.clientY-rect.top)*sy;
  let found=null, minD=20;
  RAW.forEach((p,i) => {
    if (!visible(p)||!p.u) return;
    const [cx,cy] = toCanvas(p.x,p.y);
    const d = Math.hypot(mx-(cx+jCache[i][0]), my-(cy+jCache[i][1]));
    if (d < minD) { minD=d; found=p; }
  });
  if (found) window.open(found.u,'_blank');
});

const QUAD_IMGS = {
  q1: 'images/bike-blue-ticket-vote-1-enforce.webp',
  q2: 'images/bike-blue-ticket-vote-2-lane-first.webp',
  q3: 'images/bike-blue-ticket-vote-3-license.webp',
  q4: 'images/bike-blue-ticket-vote-4-confused.webp',
};
const loadedImgs = {};
let imgsReady = 0;
Object.entries(QUAD_IMGS).forEach(([key, src]) => {
  const img = new Image();
  img.onload = () => { loadedImgs[key] = img; imgsReady++; redraw(); };
  img.onerror = () => console.warn('画像ロード失敗:', src);
  img.src = src;
});

function drawQuadImages() {
  const mid = PAD + INNER / 2;
  const quads = [
    { key: 'q1', x: mid, y: PAD, w: PAD+INNER-mid, h: mid-PAD },
    { key: 'q2', x: PAD, y: PAD, w: mid-PAD, h: mid-PAD },
    { key: 'q3', x: PAD, y: mid, w: mid-PAD, h: PAD+INNER-mid },
    { key: 'q4', x: mid, y: mid, w: PAD+INNER-mid, h: PAD+INNER-mid },
  ];
  ctx.save();
  quads.forEach(({ key, x, y, w, h }) => {
    const img = loadedImgs[key];
    if (!img) return;
    ctx.globalAlpha = imgAlpha;
    const scale = Math.min(w, h) / Math.min(img.width, img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, x + (w-dw)/2, y + (h-dh)/2, dw, dh);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

playIntro();
// rAFがバックグラウンドでスロットリングされた場合のフォールバック
setTimeout(() => {
  animating = false;
  imgAlpha = IMG_ALPHA_END;
  redraw();
}, 3000);
</script>
