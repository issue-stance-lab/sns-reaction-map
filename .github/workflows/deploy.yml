name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase credentials into HTML files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          for f in docs/*.html; do
            sed -i \
              -e "s|var supabaseUrl=\"\";|var supabaseUrl=\"${SUPABASE_URL}\";|g" \
              -e "s|var supabaseAnonKey=\"\";|var supabaseAnonKey=\"${SUPABASE_ANON_KEY}\";|g" \
              -e "s|var supabaseUrl='';|var supabaseUrl='${SUPABASE_URL}';|g" \
              -e "s|var supabaseAnonKey='';|var supabaseAnonKey='${SUPABASE_ANON_KEY}';|g" \
              "$f"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
